<!--
  Zappar AR camera WebView template.
  Placeholders: __CONFIG__ (JSON config object), __SCRIPT__ (camera init script).
  After editing, run: npm run generate:zappar-script
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>AR Camera</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    #canvas { display: block; width: 100%; height: 100%; touch-action: none; }
    #flip-btn {
      position: fixed;
      top: calc(env(safe-area-inset-top) + 12px);
      right: 12px;
      width: 44px;
      height: 44px;
      border-radius: 22px;
      background: rgba(0,0,0,0.35);
      border: none;
      cursor: pointer;
      z-index: 10;
      display: none;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
      -webkit-appearance: none;
      appearance: none;
    }
    #flip-btn:active { background: rgba(0,0,0,0.5); }
    #flip-btn svg { width: 24px; height: 24px; }
    #permission-msg {
      position: fixed;
      top: 50%;
      left: 20px;
      right: 20px;
      transform: translateY(-50%);
      color: #fff;
      text-align: center;
      font-family: -apple-system, sans-serif;
      font-size: 16px;
      z-index: 5;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <button id="flip-btn" aria-label="Switch camera" type="button">
    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M23 4v6h-6M1 20v-6h6"></path>
      <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
    </svg>
  </button>
  <div id="permission-msg">Requesting camera access…</div>
  <script>window.__ZAPPAR_CONFIG__ = __CONFIG__;</script>
  <script>
    (function() {
      var msg = document.getElementById('permission-msg');
      if (msg) msg.textContent = 'Loading libraries…';
      var urls = [
        'https://unpkg.com/three@0.128.0/build/three.min.js',
        'https://libs.zappar.com/zappar-threejs/4.3.0/zappar-threejs.js',
        'https://unpkg.com/jsqr@1.4.0/dist/jsQR.js'
      ];
      var idx = 0;
      function loadNext() {
        if (idx >= urls.length) {
          try {
            __SCRIPT__
          } catch (e) {
            if (msg) msg.textContent = 'Error: ' + (e && e.message ? e.message : String(e));
          }
          return;
        }
        var url = urls[idx++];
        var s = document.createElement('script');
        s.src = url;
        s.async = false;
        s.onload = loadNext;
        s.onerror = function() { if (msg) msg.textContent = 'Failed to load: ' + url; };
        document.head.appendChild(s);
      }
      loadNext();
      setTimeout(function() {
        if (msg && msg.textContent === 'Loading libraries…') {
          msg.textContent = 'Loading timed out. Check network and retry.';
        }
      }, 15000);
    })();
  </script>
</body>
</html>
